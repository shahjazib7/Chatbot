<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JKB Financial Services Helper</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #eef2f5; display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; }

        /* Chat Box Structure (Responsive) */
        .chat-container {
            width: 100%;
            max-width: 420px;
            height: 650px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
        }

        /* Minimized State Styles */
        .chat-container.minimized {
            height: 60px;
            max-width: 280px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 51, 102, 0.3);
            position: absolute;
            bottom: 30px;
            right: 30px;
        }
        .chat-container.minimized .chat-messages,
        .chat-container.minimized .chat-input-area,
        .chat-container.minimized .helper-text {
            display: none !important;
        }
        .chat-container.minimized .chat-header {
            padding: 18px;
            font-size: 1rem;
            border-radius: 30px;
        }

        /* Header */
        .chat-header {
            background-color: #003366;
            color: #ffffff;
            padding: 20px;
            text-align: center;
            font-size: 1.25rem;
            font-weight: 600;
            user-select: none;
        }

        /* Messages Area */
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: #f8fafc;
        }

        /* Speech Bubbles */
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .message.bot {
            background-color: #e2e8f0;
            color: #1e293b;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .message.user {
            background-color: #00509e;
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        /* Input Bar */
        .chat-input-area {
            display: flex;
            padding: 15px;
            background: #ffffff;
            border-top: 1px solid #e2e8f0;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #cbd5e1;
            border-radius: 25px;
            outline: none;
            font-size: 0.95rem;
        }
        .chat-input-area input:focus { border-color: #00509e; }
        .chat-input-area button {
            background-color: #00509e;
            color: white;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            margin-left: 10px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-input-area button:hover { background-color: #003366; }

        /* Helper Text */
        .helper-text { text-align: center; font-size: 0.75rem; color: #64748b; padding-bottom: 12px; background: #ffffff; }
    </style>
</head>
<body>

<div class="chat-container {% if minimized %}minimized{% endif %}" id="chatBox" onclick="checkMaximize()">

    <div class="chat-header" id="chatHeader">
                  JKB Financial Services Helper
    </div>

    <div class="chat-messages" id="message-container">
        <div class="message bot">
            Hello. How can I help you today?
        </div>

        {% for msg in history %}
            <div class="message {{ msg.sender }}">
                {{ msg.text | safe }}
            </div>
        {% endfor %}
    </div>

    <form method="POST" class="chat-input-area" autocomplete="off">
        <input type="text" name="question" placeholder="Ask anything..." required autofocus>
        <button type="submit" aria-label="Send message">►</button>
    </form>

    <div class="helper-text">Type "chat is closed" or say "thanks" to exit.</div>
</div>

<script>
    // Automatically scroll to the latest message
    var container = document.getElementById("message-container");
    if (container) {
        container.scrollTop = container.scrollHeight;
    }

    // Restore functionality if clicked while minimized
    function checkMaximize() {
        var chatBox = document.getElementById("chatBox");
        var header = document.getElementById("chatHeader");
        if (chatBox.classList.contains("minimized")) {
            chatBox.classList.remove("minimized");
            // Restore your custom branding when opened
            header.innerHTML = "JKB Financial Services Helper (RTR)";
            // Clean up url/session state by refreshing fresh layout
            window.location.href = "/";
        }
    }
</script>

</body>
</html>
